<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:360px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;padding:16px}
h1{font-size:18px;font-weight:700;color:#f8fafc;margin-bottom:4px}
h1 span{color:#38bdf8}
.subtitle{font-size:11px;color:#64748b;margin-bottom:16px}
.section{background:#1e293b;border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid #334155}
.section h3{font-size:13px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.page-info{font-size:12px;color:#94a3b8;margin-bottom:8px}
.page-info .ats{color:#38bdf8;font-weight:600;text-transform:uppercase}
.page-info .forms{color:#64748b}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;transition:all .15s}
.btn-fill{background:#38bdf8;color:#0f172a}
.btn-fill:hover{background:#7dd3fc}
.btn-fill:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.btn-track{background:#1a3a2a;color:#4ade80;border:1px solid #2d5a3d}
.btn-track:hover{background:#2d5a3d}
.btn-secondary{background:#334155;color:#94a3b8}
.btn-secondary:hover{background:#475569}
.result{margin-top:10px;font-size:12px;padding:10px;border-radius:8px;display:none}
.result.show{display:block}
.result.success{background:#1a3a2a;color:#4ade80;border:1px solid #2d5a3d}
.result.error{background:#3b2020;color:#f87171;border:1px solid #5a2d2d}
.result.info{background:#1e3a5f;color:#38bdf8;border:1px solid #2d4a6f}
.filled-list{font-size:11px;color:#64748b;margin-top:6px;max-height:100px;overflow-y:auto}
.filled-list div{padding:2px 0;border-bottom:1px solid #1e293b}
.setup-form label{display:block;font-size:11px;color:#64748b;margin:6px 0 2px}
.setup-form input{width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:8px;border-radius:6px;font-size:12px;margin-bottom:2px}
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:12px;cursor:pointer;background:#1e293b;color:#64748b;border:1px solid #334155}
.tab.active{background:#38bdf8;color:#0f172a;border-color:#38bdf8;font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.tracker-link{display:block;text-align:center;color:#38bdf8;font-size:12px;text-decoration:none;margin-top:8px}
.tracker-link:hover{text-decoration:underline}
</style>
</head>
<body>
<h1><span>S</span>cipio</h1>
<div class="subtitle">Auto-Apply Engine</div>

<div class="tabs">
  <div class="tab active" data-tab="apply">Apply</div>
  <div class="tab" data-tab="profile">Profile</div>
  <div class="tab" data-tab="settings">Settings</div>
</div>

<!-- APPLY TAB -->
<div class="tab-content active" id="tab-apply">
  <div class="section">
    <h3>Current Page</h3>
    <div class="page-info">
      <div id="pageTitle">Detecting...</div>
      <div>ATS: <span class="ats" id="pageAts">--</span> <span class="forms" id="pageForms"></span></div>
    </div>
  </div>

  <button class="btn btn-fill" id="fillBtn" style="margin-bottom:4px">Auto-Fill</button>
  <div style="display:flex;gap:6px;margin-bottom:8px">
    <button class="btn btn-secondary" id="fillSubmitBtn" style="flex:1;background:#1e3a5f;color:#38bdf8;padding:10px">Fill + Submit</button>
    <button class="btn btn-secondary" id="nextBtn" style="flex:1;background:#1a3a2a;color:#4ade80;padding:10px">Next &gt;</button>
  </div>
  <button class="btn btn-track" id="trackBtn">+ Add to Tracker</button>

  <div class="result" id="result"></div>
</div>

<!-- PROFILE TAB -->
<div class="tab-content" id="tab-profile">
  <div class="section">
    <div class="setup-form">
      <label>First Name</label><input id="pFirstName" placeholder="Sylvester">
      <label>Last Name</label><input id="pLastName" placeholder="Assiamah">
      <label>Email</label><input id="pEmail" type="email" placeholder="you@email.com">
      <label>Phone</label><input id="pPhone" placeholder="908-839-0555">
      <label>LinkedIn URL</label><input id="pLinkedin" placeholder="https://linkedin.com/in/...">
      <label>GitHub URL</label><input id="pGithub" placeholder="https://github.com/...">
      <label>Street Address</label><input id="pAddress" placeholder="1174 Summit Ave">
      <label>City</label><input id="pCity" placeholder="Jersey City">
      <label>State</label><input id="pState" placeholder="NJ">
      <label>Zip</label><input id="pZip" placeholder="07701">
      <label>Country</label><input id="pCountry" placeholder="United States">
      <label>Current Title</label><input id="pTitle" placeholder="Infrastructure Operations">
      <label>Current Company</label><input id="pCompany" placeholder="Hackensack Meridian Health">
      <label>Desired Salary</label><input id="pSalary" placeholder="120000">
      <label>Years Experience</label><input id="pYears" placeholder="7">
      <label>Resume (PDF/DOC)</label>
      <input type="file" id="pResume" accept=".pdf,.doc,.docx,.txt,.rtf,.odt">
      <div id="resumeStatus" style="font-size:11px;color:#64748b;margin-top:4px"></div>
    </div>
  </div>
  <button class="btn btn-fill" id="saveProfileBtn">Save Profile</button>
  <div class="result" id="profileResult"></div>
</div>

<!-- SETTINGS TAB -->
<div class="tab-content" id="tab-settings">
  <div class="section">
    <div class="setup-form">
      <label>GitHub Token (for tracker sync)</label>
      <input id="sGhToken" type="password" placeholder="ghp_xxxxx">
      <label style="margin-top:8px">Dashboard URL</label>
      <input id="sDashUrl" placeholder="https://assiamahs.github.io/scipio/">
    </div>
  </div>
  <button class="btn btn-fill" id="saveSettingsBtn">Save Settings</button>
  <a class="tracker-link" id="dashLink" href="https://assiamahs.github.io/scipio/" target="_blank">Open Dashboard</a>
</div>

<div class="result" id="globalResult"></div>

<script src="popup.js"></script>
</body>
</html>
